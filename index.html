<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>GRAND SHOP 2026 代行メモ</title>
<style>
:root {
  --bg:#faf7fb; --card:#fff; --ink:#292433; --muted:#746c79;
  --accent:#7a4fa3; --line:#e6ddec; --soft:#f1e9f7; --danger:#b63f5c;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;background:var(--bg);color:var(--ink)}
header{position:sticky;top:0;z-index:20;background:rgba(250,247,251,.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:12px}
h1{font-size:18px;margin:0 0 10px}
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.summary div{background:#fff;border:1px solid var(--line);border-radius:12px;padding:8px;text-align:center}
.summary small{display:block;font-size:10px;color:var(--muted)}
.summary b{display:block;margin-top:2px;font-size:16px;color:var(--accent)}
.controls{padding:10px 12px;display:grid;gap:8px}
.controls input,.controls select{width:100%;padding:10px;border:1px solid var(--line);border-radius:10px;background:#fff}
.filters{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}
.bonus{margin:0 12px 12px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px}
.bonus h2{font-size:15px;margin:0 0 8px}
.bonusgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.bonusgrid label{font-size:10px;color:var(--muted)}
.bonusgrid input{width:100%;margin-top:4px;padding:8px;border:1px solid var(--line);border-radius:9px;text-align:center}
.bonuscheck{margin-top:8px;padding:8px;border-radius:9px;background:var(--soft);font-size:12px}
.list{display:grid;gap:8px;padding:0 10px 130px}
.item{background:#fff;border:1px solid var(--line);border-radius:14px;padding:9px;display:grid;grid-template-columns:76px 1fr auto;gap:10px;align-items:center}
.item.active{outline:2px solid #c9b4dd;background:#fefcff}
.item.purchased{background:#f3faf7;border-color:#b8d8ca}
.item.purchased .thumb,
.item.purchased .name,
.item.purchased .variant,
.item.purchased .meta,
.item.purchased .price{opacity:.58}
.purchase-check{
  grid-column:1/-1;
  display:flex;
  align-items:center;
  justify-content:flex-end;
  gap:7px;
  border:0;
  background:transparent;
  color:var(--muted);
  font-size:12px;
  font-weight:700;
  padding:2px 0 0;
}
.purchase-check::before{
  content:"";
  width:20px;
  height:20px;
  border:2px solid var(--line);
  border-radius:6px;
  background:#fff;
}
.purchase-check.checked{color:#4f7f69}
.purchase-check.checked::before{
  content:"✓";
  display:flex;
  align-items:center;
  justify-content:center;
  border-color:#7fb39a;
  background:#7fb39a;
  color:#fff;
  font-size:14px;
}

.item.soldout{
  background:#f3f3f3;
  border-color:#d3d3d3;
}
.item.soldout .thumb,
.item.soldout .name,
.item.soldout .variant,
.item.soldout .meta,
.item.soldout .price,
.item.soldout .random-badge{
  opacity:.45;
}
.item.soldout .qty button,
.item.soldout .qty input{
  opacity:.45;
  pointer-events:none;
}
.item-actions{
  grid-column:1/-1;
  display:flex;
  justify-content:flex-end;
  align-items:center;
  gap:14px;
}
.soldout-check{
  display:flex;
  align-items:center;
  gap:7px;
  border:0;
  background:transparent;
  color:var(--muted);
  font-size:12px;
  font-weight:700;
  padding:2px 0 0;
}
.soldout-check::before{
  content:"";
  width:20px;
  height:20px;
  border:2px solid var(--line);
  border-radius:6px;
  background:#fff;
}
.soldout-check.checked{
  color:var(--danger);
}
.soldout-check.checked::before{
  content:"×";
  display:flex;
  align-items:center;
  justify-content:center;
  border-color:var(--danger);
  background:var(--danger);
  color:#fff;
  font-size:15px;
}
.thumb{width:76px;height:76px;border-radius:10px;overflow:hidden;border:1px solid var(--line);background:#fff}
.thumb img{width:100%;height:100%;object-fit:contain}
.name{font-size:13px;font-weight:700;line-height:1.4}
.variant{font-size:11px;color:var(--accent);margin-top:3px}
.meta{font-size:10px;color:var(--muted);margin-top:3px}
.price{font-size:12px;font-weight:700;margin-top:3px}
.random-badge{display:inline-block;margin-top:5px;padding:3px 7px;border-radius:999px;background:#fff3d9;color:#8a5b00;font-size:10px;font-weight:700;border:1px solid #f0d493}
.qty{display:grid;grid-template-columns:34px 58px 34px;gap:5px;align-items:center}
.qty button{border:0;border-radius:8px;padding:8px 0;background:var(--accent);color:#fff;font-size:19px;font-weight:700}
.qty input{width:58px;padding:8px 4px;border:1px solid var(--line);border-radius:8px;text-align:center;font-size:18px;font-weight:800;color:var(--ink)}
footer{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.97);border-top:1px solid var(--line);padding:9px 12px calc(9px + env(safe-area-inset-bottom));display:flex;gap:8px;z-index:30}
footer button{flex:1;border:0;border-radius:10px;padding:10px;background:var(--accent);color:#fff;font-weight:700}
footer button.secondary{background:#fff;color:var(--accent);border:1px solid var(--line)}
@media(max-width:560px){
  .filters{grid-template-columns:1fr 1fr}
  .filters select:last-child{grid-column:auto}
  .bonusgrid{grid-template-columns:1fr}
  .item{grid-template-columns:64px 1fr}
  .thumb{width:64px;height:64px}
  .qty{grid-column:2;justify-self:end}
}

.purchaserbar{padding:10px 12px 2px}
.purchaserbar-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.purchaserbar-head b{font-size:13px}
.purchaserbar-head small{color:var(--muted);font-size:10px}
.purchaser-tabs{display:flex;gap:7px;overflow-x:auto;padding:2px 1px 10px;scrollbar-width:none}
.purchaser-tabs::-webkit-scrollbar{display:none}
.purchaser-tab{flex:0 0 auto;border:1px solid var(--line);background:#fff;color:var(--muted);border-radius:999px;padding:9px 14px;font-weight:700}
.purchaser-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.purchaser-tab.add{border-style:dashed;color:var(--accent)}
.viewnote{margin:0 12px 10px;padding:8px 10px;border-radius:10px;background:var(--soft);font-size:11px;color:var(--muted)}
dialog{width:min(92vw,390px);border:0;border-radius:18px;padding:0;box-shadow:0 24px 70px rgba(31,24,38,.25)}
dialog::backdrop{background:rgba(30,24,36,.38)}
.dialogbox{padding:18px}
.dialogbox h2{font-size:17px;margin:0 0 14px}
.dialogbox label{display:block;font-size:12px;color:var(--muted);margin-bottom:12px}
.dialogbox input{width:100%;margin-top:5px;padding:11px;border:1px solid var(--line);border-radius:10px}
.dialogactions{display:flex;gap:8px;justify-content:flex-end}
.dialogactions button{border:0;border-radius:10px;padding:10px 14px;font-weight:700}
.dialogactions .cancel{background:#f0edf2;color:var(--ink)}
.dialogactions .save{background:var(--accent);color:#fff}
.manage-link{border:0;background:transparent;color:var(--accent);font-weight:700;padding:4px}
.manage-row{display:grid;grid-template-columns:1fr auto auto;gap:6px;align-items:center;padding:8px 0;border-bottom:1px solid var(--line)}
.manage-row:last-child{border-bottom:0}
.manage-row button{border:0;border-radius:8px;padding:7px 9px}
.manage-row .rename{background:var(--soft);color:var(--accent)}
.manage-row .delete{background:#fff0f3;color:var(--danger)}
.qty.aggregate input{background:#f4f1f6;color:var(--accent);font-weight:700}
.qty.aggregate button{visibility:hidden}


.share-dialog{width:min(94vw,520px);max-height:92vh}
.share-preview-wrap{background:#f4f0f6;border:1px solid var(--line);border-radius:14px;padding:10px;max-height:60vh;overflow:auto;text-align:center}
.share-preview-wrap img{display:block;width:100%;height:auto;border-radius:9px;background:#fff;box-shadow:0 4px 18px rgba(38,28,46,.12)}
.share-help{font-size:11px;line-height:1.6;color:var(--muted);margin:10px 0 0}
.share-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.share-actions button,.share-actions a{display:flex;align-items:center;justify-content:center;min-height:44px;border:0;border-radius:10px;padding:10px;font-weight:700;text-decoration:none;font-size:14px}
.share-actions .primary{background:var(--accent);color:#fff}
.share-actions .secondary{background:#fff;color:var(--accent);border:1px solid var(--line)}
.share-actions .close{grid-column:1/-1;background:#f0edf2;color:var(--ink)}
.share-actions [hidden]{display:none!important}
.share-generating{padding:28px 8px;color:var(--muted);font-size:13px}

@media print{
  header,.controls,.bonus,footer{display:none!important}
  body{background:#fff}
  .list{padding:0}
  .item{break-inside:avoid}
  .item:not(.active){display:none}
  .qty button{display:none}
}
</style>
</head>
<body>
<header>
  <h1>GRAND SHOP 2026 代行メモ</h1>
  <div class="summary">
    <div><small>選択商品</small><b id="count">0点</b></div>
    <div><small>合計金額</small><b id="total">¥0</b></div>
    <div><small>特典枚数</small><b id="bonusTotal">0枚</b></div>
  </div>
</header>


<section class="purchaserbar">
  <div class="purchaserbar-head">
    <div><b>購入者</b> <small>タブごとに数量を管理</small></div>
    <button id="managePurchasers" class="manage-link">編集</button>
  </div>
  <div id="purchaserTabs" class="purchaser-tabs"></div>
</section>
<div id="viewNote" class="viewnote"></div>

<section class="controls">
  <input id="search" placeholder="商品名・キャラクター名を検索">
  <div class="filters">
    <select id="month"><option value="">全年月</option></select>
    <select id="unit"><option value="">全所属</option></select>
    <select id="character"><option value="">全キャラクター・種類</option></select>
    <select id="category"><option value="">全カテゴリ</option></select>
    <select id="selected">
      <option value="">全商品</option>
      <option value="selected">数量入力済み</option>
      <option value="unselected">未入力</option>
      <option value="unpurchased">未購入のみ</option>
      <option value="purchased">購入済みのみ</option>
      <option value="available">販売中のみ</option>
      <option value="soldout">売り切れのみ</option>
    </select>
  </div>
</section>

<section class="bonus">
  <h2>特典の希望内訳</h2>
  <div class="bonusgrid">
    <label>YUKATA-MODE Ver.
      <input id="yukata" type="number" min="0" value="0">
    </label>
    <label>Mystical／シャイニング
      <input id="mysticalShining" type="number" min="0" value="0">
    </label>
    <label>Mystical／レイジング
      <input id="mysticalRaging" type="number" min="0" value="0">
    </label>
  </div>
  <div id="bonusCheck" class="bonuscheck">特典0枚／配分0枚</div>
</section>

<main id="list" class="list"></main>

<footer>
  <button class="secondary" id="copy">代行メモをコピー</button>
  <button id="shareImage">共有画像を作る</button>
</footer>


<dialog id="purchaserDialog">
  <form method="dialog" class="dialogbox" id="purchaserForm">
    <h2>購入者を追加</h2>
    <label>名前
      <input id="purchaserName" maxlength="20" placeholder="例：わたし、友だちA" required>
    </label>
    <div class="dialogactions">
      <button type="button" class="cancel" id="cancelPurchaser">キャンセル</button>
      <button class="save" id="savePurchaser" value="default">追加</button>
    </div>
  </form>
</dialog>

<dialog id="manageDialog">
  <div class="dialogbox">
    <h2>購入者を編集</h2>
    <div id="manageList"></div>
    <div class="dialogactions" style="margin-top:14px">
      <button class="cancel" id="closeManage">閉じる</button>
    </div>
  </div>
</dialog>


<dialog id="shareDialog" class="share-dialog">
  <div class="dialogbox">
    <h2>共有画像プレビュー</h2>
    <div id="sharePreviewWrap" class="share-preview-wrap">
      <div class="share-generating">画像を作成しています…</div>
    </div>
    <p id="shareHelp" class="share-help">iPhoneでは「共有する」が使えない場合、画像を長押しして写真に保存できます。</p>
    <div class="share-actions">
      <button type="button" id="shareNative" class="primary">共有する</button>
      <a id="downloadImage" class="secondary" download="grandshop-2026.png">画像を保存</a>
      <button type="button" id="closeShare" class="close">閉じる</button>
    </div>
  </div>
</dialog>

<script src="master.js"></script>
<script src="products.js"></script>
<script src="app.js"></script>
</body>
</html>
